<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tour HQ — Advance Tracker</title>
  <script>
    (function() {
      var user = localStorage.getItem('tourhq_current_user');
      if (!user) { window.location.href = 'landing.html'; }
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07070c;
      --bg-card: #101018;
      --bg-elevated: #181822;
      --border: #1f1f2e;
      --text: #f0f0f5;
      --dim: #8888a0;
      --muted: #555570;
      --accent: #d90429;
      --cyan: #22d3ee;
      --success: #22c55e;
      --warning: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 80px;
    }

    .user-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .user-info { display: flex; align-items: center; gap: 0.5rem; }
    .user-avatar {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #ff6b6b);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }
    .user-name { font-size: 0.9rem; font-weight: 500; }
    .logout-btn {
      background: none; border: 1px solid var(--border);
      color: var(--dim); padding: 0.4rem 0.8rem;
      border-radius: 8px; font-size: 0.8rem; cursor: pointer;
    }

    .page-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: var(--dim); text-decoration: none;
      font-size: 0.85rem; margin-bottom: 0.75rem;
    }
    .page-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .page-subtitle { color: var(--dim); font-size: 0.85rem; margin-top: 0.25rem; }

    /* Stats Bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .stat-item {
      text-align: center;
      padding: 0.5rem;
      background: var(--bg-elevated);
      border-radius: 10px;
    }
    .stat-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
    }
    .stat-number.sent { color: var(--muted); }
    .stat-number.confirmed { color: var(--warning); }
    .stat-number.responded { color: var(--cyan); }
    .stat-number.complete { color: var(--success); }
    .stat-label {
      font-size: 0.6rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    /* Advance Cards */
    .advance-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      margin: 0.75rem 1rem;
      border-radius: 14px;
      overflow: hidden;
      transition: all 0.2s;
    }
    .advance-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .advance-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--cyan);
    }
    .advance-venue {
      font-size: 0.95rem;
      font-weight: 600;
      margin-top: 2px;
    }
    .advance-city {
      font-size: 0.8rem;
      color: var(--dim);
    }
    .advance-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.sent { background: var(--muted); }
    .status-dot.confirmed { background: var(--warning); }
    .status-dot.responded { background: var(--cyan); }
    .status-dot.complete { background: var(--success); }
    .status-text {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Advance Detail */
    .advance-detail {
      padding: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .advance-detail.open {
      max-height: 600px;
      padding: 1rem;
      border-top: 1px solid var(--border);
    }
    .checklist-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0;
    }
    .checklist-check {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      font-size: 0.8rem;
    }
    .checklist-check.checked {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }
    .checklist-label {
      font-size: 0.85rem;
      flex-grow: 1;
    }
    .checklist-label.done {
      text-decoration: line-through;
      color: var(--dim);
    }
    .advance-notes {
      width: 100%;
      padding: 0.75rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
      min-height: 60px;
      margin-top: 0.75rem;
    }
    .advance-notes:focus { border-color: var(--accent); }

    /* Add Advance Button */
    .add-advance {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: calc(100% - 2rem);
      margin: 1rem;
      padding: 1rem;
      background: none;
      border: 2px dashed var(--border);
      border-radius: 12px;
      color: var(--dim);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-advance:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Add Advance Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--muted);
      border-radius: 2px;
      margin: 0 auto 1rem;
    }
    .modal h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--dim); margin-bottom: 0.4rem; }
    .form-input {
      width: 100%; padding: 0.75rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .btn {
      width: 100%; padding: 0.875rem;
      border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--bg-elevated); color: var(--text); border: 1px solid var(--border); margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="user-bar">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar">P</div>
      <span class="user-name" id="userName">Loading...</span>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="page-header">
    <a href="index.html" class="back-btn">← Back to Dashboard</a>
    <div class="page-title">Advance Tracker</div>
    <div class="page-subtitle">Track venue advances from sent to confirmed</div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-number sent" id="statSent">0</div>
      <div class="stat-label">Sent</div>
    </div>
    <div class="stat-item">
      <div class="stat-number confirmed" id="statConfirmed">0</div>
      <div class="stat-label">Confirmed</div>
    </div>
    <div class="stat-item">
      <div class="stat-number responded" id="statResponded">0</div>
      <div class="stat-label">Responded</div>
    </div>
    <div class="stat-item">
      <div class="stat-number complete" id="statComplete">0</div>
      <div class="stat-label">Complete</div>
    </div>
  </div>

  <!-- Advance List -->
  <div id="advanceList">
    <!-- Populated by JS -->
  </div>

  <!-- Add Advance Button -->
  <button class="add-advance" onclick="openModal()">
    + Add Venue to Advance
  </button>

  <!-- Add Advance Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Add Venue Advance</h2>
      <form onsubmit="addAdvance(event)">
        <div class="form-group">
          <label class="form-label">Venue Name *</label>
          <input type="text" class="form-input" id="venueName" placeholder="The Masquerade" required>
        </div>
        <div class="form-group">
          <label class="form-label">City *</label>
          <input type="text" class="form-input" id="venueCity" placeholder="Atlanta, GA" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Show Date *</label>
            <input type="date" class="form-input" id="showDate" required>
          </div>
          <div class="form-group">
            <label class="form-label">Promoter</label>
            <input type="text" class="form-input" id="promoter" placeholder="Name or agency">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Promoter Email</label>
          <input type="email" class="form-input" id="promoterEmail" placeholder="promoter@venue.com">
        </div>
        <button type="submit" class="btn btn-primary">Add to Advance List</button>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </form>
    </div>
  </div>

  <script>
    // User info
    (function() {
      var user = JSON.parse(localStorage.getItem('tourhq_current_user') || '{}');
      if (user.name) {
        document.getElementById('userName').textContent = user.name;
        document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
      }
    })();

    function logout() {
      localStorage.removeItem('tourhq_current_user');
      window.location.href = 'landing.html';
    }

    // Sample advance data
    var sampleAdvances = [
      {
        id: 1,
        venue: 'Hell at The Masquerade',
        city: 'Atlanta, GA',
        date: '2026-04-17',
        promoter: 'Masquerade Booking',
        promoterEmail: 'booking@masqueradeatlanta.com',
        status: 'complete',
        checks: {
          contractSigned: true,
          riderSent: true,
          riderConfirmed: true,
          loadinConfirmed: true,
          parkingConfirmed: true,
          hospitalityConfirmed: true,
          soundcheckBooked: true,
          contactExchanged: true
        },
        notes: 'All good. Green room available. Load-in at noon.'
      },
      {
        id: 2,
        venue: 'Conduit',
        city: 'Orlando, FL',
        date: '2026-04-18',
        promoter: 'Conduit Booking',
        promoterEmail: 'booking@conduitfl.com',
        status: 'responded',
        checks: {
          contractSigned: true,
          riderSent: true,
          riderConfirmed: true,
          loadinConfirmed: false,
          parkingConfirmed: false,
          hospitalityConfirmed: false,
          soundcheckBooked: false,
          contactExchanged: true
        },
        notes: 'Contract and rider confirmed. Need to finalize load-in time.'
      },
      {
        id: 3,
        venue: 'The Orpheum',
        city: 'Tampa, FL',
        date: '2026-04-19',
        promoter: 'Live Nation Tampa',
        promoterEmail: '',
        status: 'confirmed',
        checks: {
          contractSigned: true,
          riderSent: true,
          riderConfirmed: false,
          loadinConfirmed: false,
          parkingConfirmed: false,
          hospitalityConfirmed: false,
          soundcheckBooked: false,
          contactExchanged: false
        },
        notes: 'Contract signed. Waiting on rider confirmation.'
      },
      {
        id: 4,
        venue: 'Greensboro Coliseum',
        city: 'Greensboro, NC',
        date: '2026-04-21',
        promoter: 'Piedmont Entertainment',
        promoterEmail: '',
        status: 'sent',
        checks: {
          contractSigned: false,
          riderSent: true,
          riderConfirmed: false,
          loadinConfirmed: false,
          parkingConfirmed: false,
          hospitalityConfirmed: false,
          soundcheckBooked: false,
          contactExchanged: false
        },
        notes: 'Advance packet sent. Awaiting response.'
      }
    ];

    var advances = JSON.parse(localStorage.getItem('tourhq_advances') || 'null');
    if (!advances) {
      advances = sampleAdvances;
      localStorage.setItem('tourhq_advances', JSON.stringify(advances));
    }

    var checklistLabels = {
      contractSigned: 'Contract signed',
      riderSent: 'Rider sent to venue',
      riderConfirmed: 'Rider confirmed by venue',
      loadinConfirmed: 'Load-in time confirmed',
      parkingConfirmed: 'Parking / load-in location confirmed',
      hospitalityConfirmed: 'Hospitality rider confirmed',
      soundcheckBooked: 'Soundcheck time booked',
      contactExchanged: 'Promoter contact exchanged'
    };

    function renderAdvances() {
      var html = '';
      advances.forEach(function(adv) {
        var completedChecks = Object.values(adv.checks).filter(Boolean).length;
        var totalChecks = Object.keys(adv.checks).length;

        html += '<div class="advance-card">' +
          '<div class="advance-header" onclick="toggleDetail(' + adv.id + ')">' +
          '<div>' +
          '<div class="advance-date">' + adv.date + '</div>' +
          '<div class="advance-venue">' + adv.venue + '</div>' +
          '<div class="advance-city">' + adv.city + ' • ' + completedChecks + '/' + totalChecks + ' complete</div>' +
          '</div>' +
          '<div class="advance-status">' +
          '<span class="status-text">' + adv.status.toUpperCase() + '</span>' +
          '<div class="status-dot ' + adv.status + '"></div>' +
          '</div>' +
          '</div>' +
          '<div class="advance-detail" id="detail-' + adv.id + '">' +
          renderChecklist(adv) +
          '<textarea class="advance-notes" placeholder="Add notes..." onchange="updateNotes(' + adv.id + ', this.value)">' + (adv.notes || '') + '</textarea>' +
          '</div>' +
          '</div>';
      });
      document.getElementById('advanceList').innerHTML = html;
      updateStats();
    }

    function renderChecklist(adv) {
      var html = '';
      Object.keys(checklistLabels).forEach(function(key) {
        var checked = adv.checks[key];
        html += '<div class="checklist-item">' +
          '<div class="checklist-check ' + (checked ? 'checked' : '') + '" onclick="toggleCheck(' + adv.id + ', \'' + key + '\')">' +
          (checked ? '✓' : '') +
          '</div>' +
          '<span class="checklist-label ' + (checked ? 'done' : '') + '">' + checklistLabels[key] + '</span>' +
          '</div>';
      });
      return html;
    }

    function toggleDetail(id) {
      var detail = document.getElementById('detail-' + id);
      detail.classList.toggle('open');
    }

    function toggleCheck(id, key) {
      var adv = advances.find(function(a) { return a.id === id; });
      if (adv) {
        adv.checks[key] = !adv.checks[key];
        // Update status based on checks
        var completed = Object.values(adv.checks).filter(Boolean).length;
        if (completed === Object.keys(adv.checks).length) {
          adv.status = 'complete';
        } else if (completed >= 4) {
          adv.status = 'responded';
        } else if (adv.checks.riderSent || adv.checks.contractSigned) {
          adv.status = 'confirmed';
        }
        localStorage.setItem('tourhq_advances', JSON.stringify(advances));
        renderAdvances();
      }
    }

    function updateNotes(id, notes) {
      var adv = advances.find(function(a) { return a.id === id; });
      if (adv) {
        adv.notes = notes;
        localStorage.setItem('tourhq_advances', JSON.stringify(advances));
      }
    }

    function updateStats() {
      var stats = { sent: 0, confirmed: 0, responded: 0, complete: 0 };
      advances.forEach(function(adv) {
        if (stats[adv.status] !== undefined) stats[adv.status]++;
      });
      document.getElementById('statSent').textContent = stats.sent;
      document.getElementById('statConfirmed').textContent = stats.confirmed;
      document.getElementById('statResponded').textContent = stats.responded;
      document.getElementById('statComplete').textContent = stats.complete;
    }

    function openModal() {
      document.getElementById('addModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('addModal').classList.remove('active');
    }

    function addAdvance(e) {
      e.preventDefault();
      var newAdvance = {
        id: Date.now(),
        venue: document.getElementById('venueName').value,
        city: document.getElementById('venueCity').value,
        date: document.getElementById('showDate').value,
        promoter: document.getElementById('promoter').value,
        promoterEmail: document.getElementById('promoterEmail').value,
        status: 'sent',
        checks: {
          contractSigned: false,
          riderSent: false,
          riderConfirmed: false,
          loadinConfirmed: false,
          parkingConfirmed: false,
          hospitalityConfirmed: false,
          soundcheckBooked: false,
          contactExchanged: false
        },
        notes: ''
      };
      advances.push(newAdvance);
      localStorage.setItem('tourhq_advances', JSON.stringify(advances));
      closeModal();
      renderAdvances();
      // Reset form
      document.getElementById('venueName').value = '';
      document.getElementById('venueCity').value = '';
      document.getElementById('showDate').value = '';
      document.getElementById('promoter').value = '';
      document.getElementById('promoterEmail').value = '';
    }

    // Initialize
    renderAdvances();
  </script>
</body>
</html>
