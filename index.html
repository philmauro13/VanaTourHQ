<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VANA — Tour HQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --card: #111111;
      --accent: #d90429; /* VANA Red */
      --text: #ffffff;
      --dim: #666666;
      --border: #222222;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      max-width: 480px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      padding: 2rem 1rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
    }
    .logo-img {
      max-width: 200px;
      height: auto;
      margin-bottom: 0.5rem;
    }
    .tour-title {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .tab-nav {
      display: flex;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--dim);
      padding: 1rem;
      font-family: 'Oswald', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: var(--text);
      border-bottom: 2px solid var(--accent);
    }
    .section { display: none; padding: 1rem; }
    .section.active { display: block; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .card-header {
      padding: 1rem;
      font-family: 'Oswald', sans-serif;
      font-size: 0.8rem;
      color: var(--dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .timeline-item {
      display: flex;
      justify-content: space-between;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .timeline-item:last-child { border-bottom: none; }
    .time { 
      font-family: 'Oswald', sans-serif; 
      color: var(--accent); 
      font-weight: 600; 
      font-size: 1.1rem;
    }
    .event { 
      font-weight: 600; 
      text-align: right; 
      font-size: 0.95rem;
    }
    .info-row { 
      display: flex; 
      justify-content: space-between; 
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem; 
    }
    .info-row:last-child { border-bottom: none; }
    .label { color: var(--dim); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    .value { font-weight: 600; text-align: right; }
    .date-badge {
      background: var(--accent);
      color: white;
      font-family: 'Oswald', sans-serif;
      padding: 0.5rem 1rem;
      text-align: center;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
    }
    .next-show-header {
      background: #1a1a1a;
      padding: 1rem;
      font-family: 'Oswald', sans-serif;
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .travel-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      padding: 1rem;
      text-align: center;
    }
    .stat-box {
      background: #0a0a0a;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .stat-value {
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="vana-logo.webp" alt="VANA Logo" class="logo-img">
    <div class="tour-title">The Lady in Red Tour</div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="showTab('daysheet')">Day Sheet</button>
    <button class="tab-btn" onclick="showTab('tour')">Tour Dates</button>
    <button class="tab-btn" onclick="showTab('admats')">Admats</button>
    <button class="tab-btn" onclick="showTab('crew')">Crew</button>
  </div>

  <!-- DAY SHEET TAB -->
  <div id="daysheet" class="section active">
    <div class="date-badge" id="current-date">APRIL 11, 2026</div>
    
    <div class="card">
      <div class="card-header">Itinerary</div>
      <div id="itinerary-list"></div>
    </div>

    <div class="card">
      <div class="card-header">Venue</div>
      <div class="info-row"><span class="label">Location</span><span class="value" id="venue-name">---</span></div>
      <div class="info-row"><span class="label">City</span><span class="value" id="venue-city">---</span></div>
      <div class="info-row"><span class="label">Promoter</span><span class="value" id="venue-contact">---</span></div>
    </div>

    <div class="card">
      <div class="card-header">Hotel</div>
      <div class="info-row"><span class="label">Hotel</span><span class="value" id="hotel-name">---</span></div>
      <div class="info-row"><span class="label">Checkout</span><span class="value" id="hotel-checkout">---</span></div>
    </div>

    <div class="card">
      <div class="next-show-header">
        <span>NEXT SHOW</span>
        <span id="next-show-date" style="color: var(--text)">---</span>
      </div>
      <div class="info-row"><span class="label">Venue</span><span class="value" id="next-venue">---</span></div>
      <div class="info-row"><span class="label">City</span><span class="value" id="next-city">---</span></div>
      <div class="travel-stats">
        <div class="stat-box">
          <div class="stat-value" id="next-distance">---</div>
          <div class="stat-label">Miles</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="next-drive-time">---</div>
          <div class="stat-label">Drive Time</div>
        </div>
      </div>
    </div>
  </div>

  <!-- TOUR DATES TAB -->
  <div id="tour" class="section">
    <div class="card" id="tour-dates-list">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- ADMATS TAB -->
  <div id="admats" class="section">
    <div class="card">
      <div class="card-header">Tour Poster</div>
      <div style="padding: 1rem; text-align: center;">
        <img src="admats/vana-lady-in-red-tour-poster.jpg" alt="VANA Tour Poster" style="max-width: 100%; height: auto; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 1rem;">
        <div style="margin-top: 0.5rem;">
          <a href="admats/vana-lady-in-red-tour-poster.jpg" download style="display: inline-block; background: var(--accent); color: white; padding: 0.75rem 1.5rem; text-decoration: none; font-family: 'Oswald', sans-serif; font-weight: 600; letter-spacing: 0.05em; border-radius: 6px; text-transform: uppercase;">Download Poster</a>
        </div>
      </div>
    </div>
    
    <div class="card">
      <div class="card-header">Support Acts</div>
      <div class="info-row">
        <span class="value" style="font-family: 'Oswald', sans-serif; font-size: 1.1rem;">DEADLANDS • CLOUDYFIELD • REDHOOK</span>
      </div>
    </div>
  </div>

  <!-- CREW TAB -->
  <div id="crew" class="section">
    <div class="card">
      <div class="card-header">Tour Roster</div>
      <div id="crew-list"></div>
    </div>
  </div>

  <script>
    function showTab(tabId) {
      document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.target.classList.add('active');
    }

    fetch('data/tour_data.json')
      .then(response => response.json())
      .then(data => {
        document.getElementById('current-date').textContent = data.current_day.date.toUpperCase();
        document.getElementById('venue-name').textContent = data.current_day.venue.name;
        document.getElementById('venue-city').textContent = `${data.current_day.venue.city}, ${data.current_day.venue.state}`;
        document.getElementById('hotel-name').textContent = data.current_day.hotel.name;
        document.getElementById('hotel-checkout').textContent = data.current_day.hotel.check_out;

        const itineraryHtml = data.current_day.itinerary.map(item => `
          <div class="timeline-item">
            <span class="time">${item.time}</span>
            <span class="event">${item.event}</span>
          </div>
        `).join('');
        document.getElementById('itinerary-list').innerHTML = itineraryHtml;

        const tourHtml = data.upcoming_venues.map(venue => `
          <div class="info-row">
            <div>
              <div style="font-weight:700">${venue.venue_name}</div>
              <div style="color:var(--dim); font-size:0.8rem">${venue.city}</div>
            </div>
            <div style="text-align:right">
              <div style="color:var(--accent); font-family:'Oswald'">${venue.date}</div>
              <div style="font-size:0.8rem">DOORS ${venue.load_in}</div>
            </div>
          </div>
        `).join('');
        document.getElementById('tour-dates-list').innerHTML = tourHtml;

        const crewHtml = data.crew.map(member => `
          <div class="info-row">
            <span class="value">${member.name}</span>
            <span class="label">${member.role}</span>
          </div>
        `).join('');
        document.getElementById('crew-list').innerHTML = crewHtml;

        // Populate Next Show Info
        if (data.upcoming_venues && data.upcoming_venues.length > 0) {
          const nextShow = data.upcoming_venues[0];
          document.getElementById('next-show-date').textContent = nextShow.date;
          document.getElementById('next-venue').textContent = nextShow.venue_name;
          document.getElementById('next-city').textContent = nextShow.city;
          
          // Sample travel data (in a real app, this would come from a mapping API)
          const distances = {
            "Atlanta, GA": { miles: 450, time: "6h 30m" },
            "Orlando, FL": { miles: 500, time: "7h 15m" },
            "Tampa, FL": { miles: 135, time: "2h 10m" },
            "Greensboro, NC": { miles: 520, time: "7h 45m" },
            "Philadelphia, PA": { miles: 650, time: "9h 30m" },
            "Washington, DC": { miles: 140, time: "2h 20m" },
            "New York, NY": { miles: 225, time: "3h 45m" },
            "Cambridge, MA": { miles: 215, time: "3h 30m" },
            "Toronto, ON": { miles: 550, time: "8h 15m" },
            "Lakewood, OH": { miles: 165, time: "2h 40m" },
            "Chicago, IL": { miles: 350, time: "5h 20m" },
            "Minneapolis, MN": { miles: 410, time: "6h 10m" },
            "St. Louis, MO": { miles: 300, time: "4h 35m" },
            "Kansas City, MO": { miles: 250, time: "3h 50m" },
            "Denver, CO": { miles: 600, time: "8h 45m" },
            "Salt Lake City, UT": { miles: 525, time: "7h 50m" },
            "Boise, ID": { miles: 340, time: "5h 10m" },
            "Seattle, WA": { miles: 470, time: "7h 05m" },
            "Portland, OR": { miles: 175, time: "2h 45m" },
            "Roseville, CA": { miles: 580, time: "8h 30m" },
            "Los Angeles, CA": { miles: 380, time: "5h 40m" },
            "Anaheim, CA": { miles: 35, time: "45m" },
            "Phoenix, AZ": { miles: 375, time: "5h 30m" },
            "Austin, TX": { miles: 870, time: "12h 45m" },
            "Houston, TX": { miles: 165, time: "2h 30m" },
            "Dallas, TX": { miles: 240, time: "3h 35m" },
            "Nashville, TN": { miles: 920, time: "13h 30m" },
            "Allentown, PA": { miles: 880, time: "13h 10m" },
            "Pittsburgh, PA": { miles: 250, time: "3h 50m" },
            "Lansing, MI": { miles: 285, time: "4h 20m" },
            "Louisville, KY": { miles: 350, time: "5h 15m" }
          };

          const travelInfo = distances[nextShow.city] || { miles: "TBD", time: "TBD" };
          document.getElementById('next-distance').textContent = travelInfo.miles;
          document.getElementById('next-drive-time').textContent = travelInfo.time;
        }
      });
  </script>
</body>
</html>
