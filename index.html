<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VANA — Tour HQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --card: #111111;
      --accent: #d90429; /* VANA Red */
      --text: #ffffff;
      --dim: #666666;
      --border: #222222;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      max-width: 480px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      padding: 2rem 1rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
    }
    .logo {
      font-family: 'Oswald', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--text);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }
    .tour-title {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .tab-nav {
      display: flex;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--dim);
      padding: 1rem;
      font-family: 'Oswald', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: var(--text);
      border-bottom: 2px solid var(--accent);
    }
    .section { display: none; padding: 1rem; }
    .section.active { display: block; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .card-header {
      padding: 1rem;
      font-family: 'Oswald', sans-serif;
      font-size: 0.8rem;
      color: var(--dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .timeline-item {
      display: flex;
      justify-content: space-between;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .timeline-item:last-child { border-bottom: none; }
    .time { 
      font-family: 'Oswald', sans-serif; 
      color: var(--accent); 
      font-weight: 600; 
      font-size: 1.1rem;
    }
    .event { 
      font-weight: 600; 
      text-align: right; 
      font-size: 0.95rem;
    }
    .info-row { 
      display: flex; 
      justify-content: space-between; 
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem; 
    }
    .info-row:last-child { border-bottom: none; }
    .label { color: var(--dim); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    .value { font-weight: 600; text-align: right; }
    .date-badge {
      background: var(--accent);
      color: white;
      font-family: 'Oswald', sans-serif;
      padding: 0.5rem 1rem;
      text-align: center;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">VANA</div>
    <div class="tour-title">The Lady in Red Tour</div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="showTab('daysheet')">Day Sheet</button>
    <button class="tab-btn" onclick="showTab('tour')">Tour Dates</button>
    <button class="tab-btn" onclick="showTab('crew')">Crew</button>
  </div>

  <!-- DAY SHEET TAB -->
  <div id="daysheet" class="section active">
    <div class="date-badge" id="current-date">APRIL 11, 2026</div>
    
    <div class="card">
      <div class="card-header">Itinerary</div>
      <div id="itinerary-list"></div>
    </div>

    <div class="card">
      <div class="card-header">Venue</div>
      <div class="info-row"><span class="label">Location</span><span class="value" id="venue-name">---</span></div>
      <div class="info-row"><span class="label">City</span><span class="value" id="venue-city">---</span></div>
      <div class="info-row"><span class="label">Promoter</span><span class="value" id="venue-contact">---</span></div>
    </div>

    <div class="card">
      <div class="card-header">Hotel</div>
      <div class="info-row"><span class="label">Hotel</span><span class="value" id="hotel-name">---</span></div>
      <div class="info-row"><span class="label">Checkout</span><span class="value" id="hotel-checkout">---</span></div>
    </div>
  </div>

  <!-- TOUR DATES TAB -->
  <div id="tour" class="section">
    <div class="card" id="tour-dates-list">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- CREW TAB -->
  <div id="crew" class="section">
    <div class="card">
      <div class="card-header">Tour Roster</div>
      <div id="crew-list"></div>
    </div>
  </div>

  <script>
    function showTab(tabId) {
      document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.target.classList.add('active');
    }

    fetch('data/tour_data.json')
      .then(response => response.json())
      .then(data => {
        document.getElementById('current-date').textContent = data.current_day.date.toUpperCase();
        document.getElementById('venue-name').textContent = data.current_day.venue.name;
        document.getElementById('venue-city').textContent = `${data.current_day.venue.city}, ${data.current_day.venue.state}`;
        document.getElementById('hotel-name').textContent = data.current_day.hotel.name;
        document.getElementById('hotel-checkout').textContent = data.current_day.hotel.check_out;

        const itineraryHtml = data.current_day.itinerary.map(item => `
          <div class="timeline-item">
            <span class="time">${item.time}</span>
            <span class="event">${item.event}</span>
          </div>
        `).join('');
        document.getElementById('itinerary-list').innerHTML = itineraryHtml;

        const tourHtml = data.upcoming_venues.map(venue => `
          <div class="info-row">
            <div>
              <div style="font-weight:700">${venue.venue_name}</div>
              <div style="color:var(--dim); font-size:0.8rem">${venue.city}</div>
            </div>
            <div style="text-align:right">
              <div style="color:var(--accent); font-family:'Oswald'">${venue.date}</div>
              <div style="font-size:0.8rem">DOORS ${venue.load_in}</div>
            </div>
          </div>
        `).join('');
        document.getElementById('tour-dates-list').innerHTML = tourHtml;

        const crewHtml = data.crew.map(member => `
          <div class="info-row">
            <span class="value">${member.name}</span>
            <span class="label">${member.role}</span>
          </div>
        `).join('');
        document.getElementById('crew-list').innerHTML = crewHtml;
      });
  </script>
</body>
</html>
