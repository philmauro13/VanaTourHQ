<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vana Tour HQ — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #161618;
      --accent: #e63946;
      --text: #f0f0f5;
      --dim: #8888a0;
      --border: #2a2a30;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 1rem;
      max-width: 480px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      padding: 1.5rem 0;
      border-bottom: 2px solid var(--accent);
      margin-bottom: 1.5rem;
    }
    .tour-name { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; }
    .artist { color: var(--accent); font-size: 0.9rem; font-weight: 600; }
    .tab-nav {
      display: flex;
      justify-content: space-between;
      background: var(--card);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--dim);
      padding: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: white;
    }
    .section { display: none; }
    .section.active { display: block; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .card-header {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--dim);
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: 0.05em;
    }
    .timeline-item {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .timeline-item:last-child { border-bottom: none; }
    .time { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 600; }
    .event { font-weight: 600; text-align: right; }
    .info-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .label { color: var(--dim); }
    .value { font-weight: 600; text-align: right; }
    .status-pill {
      display: inline-block;
      background: rgba(230, 57, 70, 0.1);
      color: var(--accent);
      padding: 0.25rem 0.75rem;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="tour-name">TOUR HQ</div>
    <div class="artist" id="artist-name">Loading...</div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="showTab('daysheet')">Day Sheet</button>
    <button class="tab-btn" onclick="showTab('specs')">Tech Specs</button>
    <button class="tab-btn" onclick="showTab('crew')">Crew</button>
  </div>

  <!-- DAY SHEET TAB -->
  <div id="daysheet" class="section active">
    <div class="card">
      <div class="card-header">Today's Schedule</div>
      <div class="status-pill" id="current-date">APRIL 11, 2026</div>
      <div id="itinerary-list">
        <!-- Populated by JS -->
      </div>
    </div>

    <div class="card">
      <div class="card-header">Venue Info</div>
      <div class="info-row"><span class="label">Venue</span><span class="value" id="venue-name">---</span></div>
      <div class="info-row"><span class="label">City</span><span class="value" id="venue-city">---</span></div>
      <div class="info-row"><span class="label">Contact</span><span class="value" id="venue-contact">---</span></div>
    </div>

    <div class="card">
      <div class="card-header">Hotel</div>
      <div class="info-row"><span class="label">Hotel</span><span class="value" id="hotel-name">---</span></div>
      <div class="info-row"><span class="label">Checkout</span><span class="value" id="hotel-checkout">---</span></div>
    </div>
  </div>

  <!-- TECH SPECS TAB -->
  <div id="specs" class="section">
    <div class="card">
      <div class="card-header">Power & Production</div>
      <div class="info-row"><span class="label">Power Drop</span><span class="value">200A 3-Phase</span></div>
      <div class="info-row"><span class="label">Load-In</span><span class="value">Dock Access</span></div>
      <div class="info-row"><span class="label">House Lights</span><span class="value">LED Par</span></div>
    </div>
  </div>

  <!-- CREW TAB -->
  <div id="crew" class="section">
    <div class="card">
      <div class="card-header">Tour Roster</div>
      <div id="crew-list">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <script>
    // Simple Tab Switcher
    function showTab(tabId) {
      document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.target.classList.add('active');
    }

    // Data Fetching
    fetch('data/tour_data.json')
      .then(response => response.json())
      .then(data => {
        document.getElementById('artist-name').textContent = data.artist;
        document.getElementById('current-date').textContent = data.current_day.date;
        document.getElementById('venue-name').textContent = data.current_day.venue.name;
        document.getElementById('venue-city').textContent = `${data.current_day.venue.city}, ${data.current_day.venue.state}`;
        document.getElementById('hotel-name').textContent = data.current_day.hotel.name;
        document.getElementById('hotel-checkout').textContent = data.current_day.hotel.check_out;

        // Populate Itinerary
        const itineraryHtml = data.current_day.itinerary.map(item => `
          <div class="timeline-item">
            <span class="time">${item.time}</span>
            <span class="event">${item.event}</span>
          </div>
        `).join('');
        document.getElementById('itinerary-list').innerHTML = itineraryHtml;

        // Populate Crew
        const crewHtml = data.crew.map(member => `
          <div class="info-row">
            <span class="value">${member.name}</span>
            <span class="label">${member.role}</span>
          </div>
        `).join('');
        document.getElementById('crew-list').innerHTML = crewHtml;
      })
      .catch(err => console.error('Error loading tour data:', err));
  </script>
</body>
</html>
